<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Timeline of Everything — 13.8 billion years, one navigable timeline</title>
  <meta name="description"
    content="An interactive timeline from the Big Bang to speculative futures: 191 curated events across cosmology, history, science and technology, on one zoomable 13.8-billion-year scale." />
  <meta name="author" content="Yannic Bachmann" />
  <link rel="canonical" href="https://ybachmann.github.io/TimelineOfEverything/" />

  <!-- Link previews (Open Graph / Twitter). Unlike href/src attributes, meta
       content is NOT rewritten by Vite's base handling, and social scrapers
       reject relative URLs — both reasons these must stay absolute. -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Timeline of Everything" />
  <meta property="og:locale" content="en" />
  <meta property="og:url" content="https://ybachmann.github.io/TimelineOfEverything/" />
  <meta property="og:title" content="Timeline of Everything" />
  <meta property="og:description"
    content="An interactive timeline from the Big Bang to speculative futures — 13.8 billion years of cosmology, history, science and technology on one zoomable scale." />
  <meta property="og:image" content="https://ybachmann.github.io/TimelineOfEverything/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt"
    content="A dark timeline graphic marking the Big Bang, first life, cuneiform, the Moon landing and the death of the Sun." />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Timeline of Everything" />
  <meta name="twitter:description"
    content="An interactive timeline from the Big Bang to speculative futures — 13.8 billion years on one zoomable scale." />
  <meta name="twitter:image" content="https://ybachmann.github.io/TimelineOfEverything/og-image.png" />

  <!-- Root-relative hrefs ARE rewritten to the /TimelineOfEverything/ base. -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0a0e27" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
